name: "Slack Message"
description: "Send a message to Slack with optional thread reply"
inputs:
  # All inputs can instead be provided as CAPITAL_CASE environment variables instead
  channel_id:
    description: "Slack channel ID"
    required: false
  message:
    description: "Main message to send"
    required: false
  message_ts:
    description: "Timestamp of existing message to update and/or reply to in thread"
    required: false
  thread_message:
    description: "Optional thread reply message"
    required: false
  token:
    description: "Slack OAuth token"
    required: false
  username:
    description: "Display name to post the message as. NOTE: only impersonate a person when they are triggering the message--it should not be unexpected."
    required: false
  avatar_url:
    description: "Avatar URL to use for the message. NOTE: only impersonate a person when they are triggering the message--it should not be unexpected."
    required: false
  avatar_emoji:
    description: "Slack emoji to use as the threaded message's avatar (e.g. ':kangaroo:'). Ignored when avatar_url is provided."
    required: false
  thread_username:
    description: "Display name to post the threaded message as. NOTE: only impersonate a person when they are triggering the message--it should not be unexpected."
    required: false
  thread_avatar_url:
    description: "Avatar URL to use for the threaded message. NOTE: only impersonate a person when they are triggering the message--it should not be unexpected."
    required: false
  thread_avatar_emoji:
    description: "Slack emoji to use as the threaded message's avatar (e.g. ':kangaroo:'). Ignored when thread_avatar_url is provided."
    required: false

outputs:
  message_ts:
    description: "Timestamp of the main message"
    value: ${{ steps.main-message.outputs.ts || env.MESSAGE_TS }}

runs:
  using: "composite"
  steps:
    - name: Resolve inputs
      shell: bash
      run: |
        set -euo pipefail

        # For each value, prefer the env var (set by caller via $GITHUB_ENV),
        # fall back to the action input (for backward compatibility with other callers)
        echo "CHANNEL_ID=${CHANNEL_ID:-$INPUT_CHANNEL_ID}" >> "$GITHUB_ENV"
        echo "MESSAGE=${MESSAGE:-$INPUT_MESSAGE}" >> "$GITHUB_ENV"
        echo "MESSAGE_TS=${MESSAGE_TS:-$INPUT_MESSAGE_TS}" >> "$GITHUB_ENV"
        echo "THREAD_MESSAGE=${THREAD_MESSAGE:-$INPUT_THREAD_MESSAGE}" >> "$GITHUB_ENV"
        echo "TOKEN=${TOKEN:-$INPUT_TOKEN}" >> "$GITHUB_ENV"
        echo "USERNAME=${USERNAME:-$INPUT_USERNAME}" >> "$GITHUB_ENV"
        echo "AVATAR_URL=${AVATAR_URL:-$INPUT_AVATAR_URL}" >> "$GITHUB_ENV"
        echo "AVATAR_EMOJI=${AVATAR_EMOJI:-$INPUT_AVATAR_EMOJI}" >> "$GITHUB_ENV"
        echo "THREAD_USERNAME=${THREAD_USERNAME:-$INPUT_THREAD_USERNAME}" >> "$GITHUB_ENV"
        echo "THREAD_AVATAR_URL=${THREAD_AVATAR_URL:-$INPUT_THREAD_AVATAR_URL}" >> "$GITHUB_ENV"
        echo "THREAD_AVATAR_EMOJI=${THREAD_AVATAR_EMOJI:-$INPUT_THREAD_AVATAR_EMOJI}" >> "$GITHUB_ENV"

      env:
        INPUT_CHANNEL_ID: ${{ inputs.channel_id }}
        INPUT_MESSAGE: ${{ inputs.message }}
        INPUT_MESSAGE_TS: ${{ inputs.message_ts }}
        INPUT_THREAD_MESSAGE: ${{ inputs.thread_message }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_USERNAME: ${{ inputs.username }}
        INPUT_AVATAR_URL: ${{ inputs.avatar_url }}
        INPUT_AVATAR_EMOJI: ${{ inputs.avatar_emoji }}
        INPUT_THREAD_USERNAME: ${{ inputs.thread_username }}
        INPUT_THREAD_AVATAR_URL: ${{ inputs.thread_avatar_url }}
        INPUT_THREAD_AVATAR_EMOJI: ${{ inputs.thread_avatar_emoji }}
    - name: Validate inputs
      shell: bash
      run: |
        set -euo pipefail

        if [ -z "$CHANNEL_ID" ]; then
          echo "ERROR: 'channel_id' is required"
          exit 1
        fi

        if [ -z "$MESSAGE" ] && [ -z "$MESSAGE_TS" ]; then
          echo "ERROR: Either 'message' or 'message_ts' must be provided"
          exit 1
        fi

        if [ -n "$MESSAGE_TS" ] && [ -z "$MESSAGE" ] && [ -z "$THREAD_MESSAGE" ]; then
          echo "ERROR: When 'message_ts' is provided, either 'message' or 'thread_message' is required"
          exit 1
        fi

        python .github/scripts/slack.py auth-test

        if [ -n "$MESSAGE_TS" ] && [ -n "$THREAD_MESSAGE" ] && [ -z "$MESSAGE" ]; then
          # validate that we can find the parent message if we're threading
          python .github/scripts/slack.py find-message
        fi
    - name: Send main message to Slack channel
      if: ${{ env.MESSAGE_TS == '' && env.MESSAGE != '' }}
      id: main-message
      shell: bash
      run: python .github/scripts/slack.py post-message
    - name: Update main message
      if: ${{ env.MESSAGE_TS != '' && env.MESSAGE != '' }}
      shell: bash
      run: python .github/scripts/slack.py update-message
    - name: Send thread reply
      if: ${{ env.THREAD_MESSAGE != '' }}
      id: thread-reply
      shell: bash
      run: python .github/scripts/slack.py post-message
      env:
        MESSAGE: ${{ env.THREAD_MESSAGE }}
        USERNAME: ${{ env.THREAD_USERNAME }}
        AVATAR_URL: ${{ env.THREAD_AVATAR_URL }}
        AVATAR_EMOJI: ${{ env.THREAD_AVATAR_EMOJI }}
        THREAD_TS: ${{ env.MESSAGE_TS || steps.main-message.outputs.ts }}

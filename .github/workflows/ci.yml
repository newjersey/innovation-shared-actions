name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test-pickaroo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements-dev.txt

      - name: Run pickaroo tests
        run: pytest .github/scripts/tests/ -v

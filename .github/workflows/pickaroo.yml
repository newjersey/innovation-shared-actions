name: "Pickaroo Reviewers"

on:
  workflow_call:
    inputs:
      include_teams:
        description: The github teams to pick reviewers from (space delimited)
        type: "string"
        required: false
      exclude_teams:
        description: The github teams to exclude reviewers from (space delimited)
        type: "string"
        required: false
      include_users:
        description: Individual GitHub usernames to include (space delimited)
        type: "string"
        required: false
      exclude_users:
        description: Individual GitHub usernames to exclude (space delimited)
        type: "string"
        required: false
      number_of_reviewers:
        default: 1
        type: number
        description: The number of reviewers to select
      number_of_repicks:
        default: 1
        type: number
        description: The number of reviewers to select on subsequent runs
      channel_id:
        required: true
        description: The Slack Channel ID to notify
        type: string
      show:
        default: false
        type: boolean
        description: If true, only post a Slack message without selecting reviewers
    secrets:
      SLACK_OAUTH_TOKEN:
        required: false
      OOI_PULL_REQUEST_APP:
        required: false

jobs:
  pickaroo:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: "2454947"
          private-key: ${{ secrets.OOI_PULL_REQUEST_APP }}

      - uses: actions/checkout@v6
        with:
          repository: newjersey/innovation-shared-actions
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Find existing pickaroo comment
        id: find-comment
        run: python .github/scripts/pickaroo.py find-comment
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Request Reviewers
        if: ${{ !inputs.show }}
        id: request-reviewers
        uses: ./.github/actions/pickaroo
        with:
          include_teams: ${{ inputs.include_teams }}
          include_users: ${{ inputs.include_users }}
          exclude_teams: ${{ inputs.exclude_teams }}
          exclude_users: ${{ inputs.exclude_users }} ${{ steps.find-comment.outputs.previously-picked }}
          number_of_reviewers: ${{ steps.find-comment.outputs.message-ts != '' && inputs.number_of_repicks || inputs.number_of_reviewers }}
          github_slack_mapping: ${{ vars.GH_SLACK_USER_MAP }}
          slack_token: ${{ secrets.SLACK_OAUTH_TOKEN }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Look up Slack users for new reviewers
        if: ${{ !inputs.show }}
        id: lookup-new-reviewers
        uses: ./.github/actions/lookup-slack-users
        with:
          github_usernames: ${{ steps.request-reviewers.outputs.reviewers }}
          github_slack_mapping: ${{ vars.GH_SLACK_USER_MAP }}

      - name: Look up PR author in Slack
        id: lookup-pr-author
        uses: ./.github/actions/lookup-slack-users
        with:
          github_usernames: ${{ github.event.pull_request.user.login }}
          github_slack_mapping: ${{ vars.GH_SLACK_USER_MAP }}

      - name: Get current requested reviewers
        id: get-current-reviewers
        if: ${{ steps.request-reviewers.outputs.reviewers != '' }}
        shell: bash
        run: |
          REVIEWERS=$(gh api repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/requested_reviewers \
            --jq '[.users[].login] | join(" ")')
          echo "reviewers=$REVIEWERS" >> $GITHUB_OUTPUT
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Look up current reviewers in Slack
        id: lookup-current-reviewers
        if: ${{ steps.get-current-reviewers.conclusion == 'success' }}
        uses: ./.github/actions/lookup-slack-users
        with:
          github_usernames: ${{ steps.get-current-reviewers.outputs.reviewers }}
          github_slack_mapping: ${{ vars.GH_SLACK_USER_MAP }}

      - name: Build Slack messages
        run: python .github/scripts/pickaroo.py build-messages
        env:
          REVIEWERS: ${{ steps.request-reviewers.outputs.reviewers }}
          NEW_REVIEWER_MENTIONS: ${{ steps.lookup-new-reviewers.outputs.formatted_string }}
          CURRENT_REVIEWER_MENTIONS: ${{ steps.lookup-current-reviewers.outputs.formatted_string }}
          AUTHOR_MENTION: ${{ steps.lookup-pr-author.outputs.formatted_string }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHOW: ${{ inputs.show }}

      - name: Send Slack message
        id: send-slack-message
        uses: ./.github/actions/slack-message
        env:
          CHANNEL_ID: ${{ inputs.channel_id }}
          MESSAGE_TS: ${{ steps.find-comment.outputs.message-ts }}
          TOKEN: ${{ secrets.SLACK_OAUTH_TOKEN }}

      - name: Post PR comment
        run: python .github/scripts/pickaroo.py post-comment
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEWERS: ${{ steps.request-reviewers.outputs.reviewers }}
          PREVIOUSLY_PICKED: ${{ steps.find-comment.outputs.previously-picked }}
          MESSAGE_TS: ${{ steps.send-slack-message.outputs.message_ts }}
          COMMENT_ID: ${{ steps.find-comment.outputs.comment-id }}

  remove-label:
    # only remove a label if one was added
    if: ${{ always() && github.event.action == 'labeled' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: "2454947"
          private-key: ${{ secrets.OOI_PULL_REQUEST_APP }}
      - name: Remove triggering label
        run: |
          set -euo pipefail

          echo "Removing label '${{ github.event.label.name }}' from PR #${{ github.event.pull_request.number }}"
          if ! gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/${{ github.event.label.name }} \
            -X DELETE 2>&1; then
            echo "WARNING: Failed to remove label '${{ github.event.label.name }}'"
          else
            echo "Successfully removed label"
          fi
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}

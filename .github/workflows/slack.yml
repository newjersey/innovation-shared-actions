# Docs: https://docs.slack.dev/tools/slack-github-action/sending-techniques/sending-data-slack-api-method/

name: "Slack Notification"

on:
  workflow_call:
    inputs:
      channel_id:
        description: "Slack channel ID"
        required: true
        type: string
      message:
        description: "Main message to send"
        required: false
        type: string
      message_ts:
        description: "Timestamp of existing message to update and/or reply to in thread"
        required: false
        type: string
      thread_message:
        description: "Optional thread reply message"
        required: false
        type: string
      username:
        description: "Display name to post the message as. NOTE: only impersonate a person when they are triggering the message--it should not be unexpected."
        required: false
        type: string
      avatar_url:
        description: "Avatar URL to use for the message. NOTE: only impersonate a person when they are triggering the message--it should not be unexpected."
        required: false
        type: string
      avatar_emoji:
        description: "Slack emoji to use as the message's avatar (e.g. ':kangaroo:'). Ignored when avatar_url is provided."
        required: false
        type: string
      thread_username:
        description: "Display name to post the threaded message as. NOTE: only impersonate a person when they are triggering the message--it should not be unexpected."
        required: false
        type: string
      thread_avatar_url:
        description: "Avatar URL to use for the threaded message. NOTE: only impersonate a person when they are triggering the message--it should not be unexpected."
        required: false
        type: string
      thread_avatar_emoji:
        description: "Slack emoji to use as the threaded message's avatar (e.g. ':kangaroo:'). Ignored when thread_avatar_url is provided."
        required: false
        type: string
    outputs:
      message_ts:
        description: "Timestamp of the main message"
        value: ${{ jobs.send-slack-message.outputs.message_ts }}
    secrets:
      SLACK_OAUTH_TOKEN:
        required: false

jobs:
  send-slack-message:
    runs-on: ubuntu-latest
    outputs:
      message_ts: ${{ steps.slack.outputs.message_ts }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: newjersey/innovation-shared-actions
      - name: Send Slack message
        id: slack
        uses: ./.github/actions/slack-message
        env:
          CHANNEL_ID: ${{ inputs.channel_id }}
          MESSAGE: ${{ inputs.message }}
          MESSAGE_TS: ${{ inputs.message_ts }}
          THREAD_MESSAGE: ${{ inputs.thread_message }}
          TOKEN: ${{ secrets.SLACK_OAUTH_TOKEN }}
          USERNAME: ${{ inputs.username }}
          AVATAR_URL: ${{ inputs.avatar_url }}
          AVATAR_EMOJI: ${{ inputs.avatar_emoji }}
          THREAD_USERNAME: ${{ inputs.thread_username }}
          THREAD_AVATAR_URL: ${{ inputs.thread_avatar_url }}
          THREAD_AVATAR_EMOJI: ${{ inputs.thread_avatar_emoji }}
